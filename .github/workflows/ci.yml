name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: mcp
        run: uv sync --group dev

      - name: Run tests
        working-directory: mcp
        run: uv run pytest tests/ --ignore=tests/test_playwright_pool.py -v
