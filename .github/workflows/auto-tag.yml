name: Auto Tag

# Fires on every merge to main. Reads the latest semver tag, bumps the patch
# number, and pushes a new tag — which chains into release.yml to build and
# publish a GitHub Release.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    # Skip version-bump commits pushed by this workflow itself (shouldn't
    # produce tags since we only push a tag, but guard anyway).
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history

      - name: Compute next patch tag
        id: next
        run: |
          LATEST=$(git tag --sort=-version:refname | grep '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.1.0"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "tag=v${MAJOR}.${MINOR}.$((PATCH + 1))" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git tag "${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"
