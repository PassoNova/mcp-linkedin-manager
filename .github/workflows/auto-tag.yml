name: Auto Release

# Fires on every merge to main: bumps the patch tag, runs tests, builds
# linkedin-mcp.plugin, and publishes a GitHub Release — all in one job chain
# to avoid GITHUB_TOKEN cross-workflow dispatch restrictions.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch tag
        id: next
        run: |
          LATEST=$(git tag --sort=-version:refname | grep '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "tag=v${MAJOR}.${MINOR}.$((PATCH + 1))" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git tag "${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"

  test:
    needs: tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: mcp
        run: uv sync --group dev

      - name: Run tests
        working-directory: mcp
        run: uv run pytest tests/ --ignore=tests/test_playwright_pool.py -v

  build-and-release:
    needs: [tag, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build linkedin-mcp.plugin
        run: |
          cp README.md mcp/README.md
          zip -r linkedin-mcp.plugin \
            mcp/*.py \
            mcp/linkedin_mcp/ \
            mcp/pyproject.toml \
            mcp/uv.lock \
            mcp/README.md \
            skills/ \
            .claude-plugin/ \
            .mcp.json \
            .env.example \
            README.md

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-mcp-plugin
          path: linkedin-mcp.plugin
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: linkedin-mcp.plugin
          generate_release_notes: true
