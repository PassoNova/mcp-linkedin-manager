name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: mcp
        run: uv sync --group dev

      - name: Run tests
        working-directory: mcp
        run: uv run pytest tests/ --ignore=tests/test_playwright_pool.py -v

  build-plugin:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build linkedin-mcp.plugin
        run: |
          cp README.md mcp/README.md
          zip -r linkedin-mcp.plugin \
            mcp/auth.py \
            mcp/client.py \
            mcp/server.py \
            mcp/cache.py \
            mcp/log_config.py \
            mcp/linkedin_mcp/ \
            mcp/pyproject.toml \
            mcp/uv.lock \
            mcp/README.md \
            skills/ \
            .claude-plugin/ \
            .mcp.json \
            .env.example \
            README.md

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-mcp-plugin
          path: linkedin-mcp.plugin
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: linkedin-mcp.plugin
          generate_release_notes: true
